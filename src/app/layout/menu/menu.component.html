
  <mat-toolbar color="primary">
    <button mat-icon-button class="example-icon" aria-label="Example icon-button with menu icon" (click)="opened=!opened" *ngIf="alunoEstaLogado">
      <mat-icon>menu</mat-icon>
    </button>
    <span>Virtual Rooms <mat-icon>school</mat-icon></span>
    <span class="example-spacer"></span>
    <span *ngIf="alunoEstaLogado" class="user-name">Olá, {{alunoPrincipal.nome}}</span>
    <button mat-button class="example-icon" routerLink="entrar-disciplina" *ngIf="alunoEstaLogado"> 
      <mat-icon>add</mat-icon> Matricular-se
    </button>
    <button mat-icon-button class="example-icon" *ngIf="alunoEstaLogado" (click)="deslogar()" title="Sair">
      <mat-icon>logout</mat-icon>
    </button>
    <button mat-icon-button class="example-icon" aria-label="User profile" routerLink="" *ngIf="!alunoEstaLogado">
      <mat-icon>person</mat-icon>
    </button>
  </mat-toolbar>

<mat-sidenav-container>
  <mat-sidenav [(opened)]="opened" mode="push" *ngIf="alunoEstaLogado">
    <button mat-button class="buttonSideNav" routerLink="listagem-disciplina"> <mat-icon>book</mat-icon>Listagem de Disciplinas</button>
    <button mat-button class="buttonSideNav" routerLink="cadastro-disciplina"> <mat-icon>app_registration</mat-icon>Cadastro</button>
    <button mat-button class="buttonSideNav" routerLink="listar-disciplinas-matriculado"> <mat-icon>book</mat-icon>Minhas Disciplinas</button>

    <mat-expansion-panel hideToggle *ngIf="disciplinasMatriculadas.length > 0">
      <mat-expansion-panel-header>
        <mat-panel-title class="painelSideNav">
          <mat-icon>history_edu</mat-icon>
        </mat-panel-title>
        <mat-panel-description>
          Inscrito ({{disciplinasMatriculadas.length}})
        </mat-panel-description>
      </mat-expansion-panel-header>
      <mat-card class="side-nav-card" *ngFor="let disciplina of disciplinasMatriculadas">
        <mat-card-header>
          <mat-card-title style="font-size: 14px; font-weight: 500;">{{disciplina.nome}}</mat-card-title>
        </mat-card-header>
        <mat-card-content>
          <p style="font-size: 12px; color: #666; margin: 4px 0 0 0;">Semestre: {{disciplina.semestre}}</p>
        </mat-card-content>
      </mat-card>
    </mat-expansion-panel>
  </mat-sidenav>

  <mat-sidenav-content class="tela">
    <router-outlet></router-outlet>
  </mat-sidenav-content>
</mat-sidenav-container>
